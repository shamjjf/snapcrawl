# Local infra for SnapCrawl: MongoDB for metadata.
#
# Object storage is NOT here. Screenshots go to real AWS S3 in every
# environment, configured entirely through apps/api/.env (S3_REGION, S3_BUCKET
# and the access keys). There is no local storage stand-in to start.
services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
